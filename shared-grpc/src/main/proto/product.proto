syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.gofer.ecommerce.product.grpc";
option java_outer_classname = "ProductProto";

import "google/protobuf/empty.proto";

package product;

service ProductCatalogService {
  rpc GetProduct (GetProductRequest) returns (ProductResponse);

  rpc CheckAvailability (CheckAvailabilityRequest) returns (AvailabilityResponse);

  rpc ListProducts (ListProductsRequest) returns (stream ProductResponse);

  rpc CreateProduct (CreateProductRequest) returns (ProductResponse);

  rpc UpdateStock (UpdateStockRequest) returns (google.protobuf.Empty);

  rpc GetAllCategories (google.protobuf.Empty) returns (stream CategoryResponse);
}

message CategoryResponse {
  string category_name = 1;
}

message ListProductsRequest {
  string category = 1;
  int32 offset = 2;
  int32 limit = 3;
}

message GetProductRequest {
  string product_id = 1;
}

message ProductResponse {
  string id = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  int32 stock_quantity = 5;
}

message CreateProductRequest {
  string name = 1;
  string description = 2;
  string category = 3;
  double price = 4;
  int32 stock_quantity = 5;
}

message UpdateStockRequest {
  string product_id = 1;
  int32 new_stock_quantity = 2;
}

message CheckAvailabilityRequest {
  string product_id = 1;
  int32 requested_quantity = 2;
}

message AvailabilityResponse {
  bool is_available = 1;
}